<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 28px 24px 20px;
    }

    header h1 { font-size: 1.6rem; font-weight: 700; }

    .stats {
      margin-top: 6px;
      font-size: 0.85rem;
      opacity: 0.85;
    }

    .input-area {
      padding: 20px 24px;
      border-bottom: 1px solid #eee;
      display: flex;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus { border-color: #667eea; }

    .input-area button {
      background: #667eea;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 1.3rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-area button:hover { background: #5a67d8; }

    .filters {
      display: flex;
      padding: 12px 24px;
      gap: 8px;
      border-bottom: 1px solid #eee;
    }

    .filters button {
      border: none;
      background: #f0f4f8;
      color: #555;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filters button.active {
      background: #667eea;
      color: white;
    }

    ul {
      list-style: none;
      padding: 12px 0;
      max-height: 420px;
      overflow-y: auto;
    }

    li {
      display: flex;
      align-items: center;
      padding: 12px 24px;
      gap: 12px;
      transition: background 0.15s;
    }

    li:hover { background: #f8faff; }

    li.checked .item-text {
      text-decoration: line-through;
      color: #aaa;
    }

    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #333;
      word-break: break-all;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: #e53e3e; background: #fff5f5; }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 40px 0;
      font-size: 0.95rem;
    }

    .clear-btn {
      display: block;
      width: calc(100% - 48px);
      margin: 0 24px 20px;
      padding: 10px;
      background: none;
      border: 2px solid #fed7d7;
      color: #e53e3e;
      border-radius: 10px;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover { background: #fff5f5; }

    .loading {
      text-align: center;
      color: #999;
      padding: 40px 0;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>🛒 쇼핑 리스트</h1>
    <div class="stats" id="stats">로딩 중...</div>
  </header>

  <div class="input-area">
    <input id="itemInput" type="text" placeholder="아이템 입력 후 Enter 또는 +" maxlength="60">
    <button id="addBtn" title="추가">+</button>
  </div>

  <div class="filters">
    <button class="active" data-filter="all">전체</button>
    <button data-filter="active">미완료</button>
    <button data-filter="done">완료</button>
  </div>

  <ul id="list"></ul>

  <button class="clear-btn" id="clearDone">완료 항목 모두 삭제</button>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL = 'https://yrrxdaahoyfvhewvklkx.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlycnhkYWFob3lmdmhld3ZrbGt4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NjM3MDQsImV4cCI6MjA5MjEzOTcwNH0.xVCuSClGdB40bVRsmIyiY5jsK8AxoEojeEbEE3MBy14';

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let items = [];
  let filter = 'all';

  const input = document.getElementById('itemInput');
  const list = document.getElementById('list');
  const stats = document.getElementById('stats');

  async function loadItems() {
    const { data, error } = await supabase
      .from('shopping_items')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      console.error('로드 실패:', error);
      return;
    }
    items = data;
    render();
  }

  async function addItem() {
    const text = input.value.trim();
    if (!text) return;

    const { data, error } = await supabase
      .from('shopping_items')
      .insert({ text, done: false })
      .select()
      .single();

    if (error) { console.error('추가 실패:', error); return; }

    items.unshift(data);
    input.value = '';
    render();
  }

  async function toggle(id) {
    const item = items.find(i => i.id === id);
    if (!item) return;

    const { error } = await supabase
      .from('shopping_items')
      .update({ done: !item.done })
      .eq('id', id);

    if (error) { console.error('수정 실패:', error); return; }

    item.done = !item.done;
    render();
  }

  async function remove(id) {
    const { error } = await supabase
      .from('shopping_items')
      .delete()
      .eq('id', id);

    if (error) { console.error('삭제 실패:', error); return; }

    items = items.filter(i => i.id !== id);
    render();
  }

  async function clearDone() {
    const doneIds = items.filter(i => i.done).map(i => i.id);
    if (doneIds.length === 0) return;

    const { error } = await supabase
      .from('shopping_items')
      .delete()
      .in('id', doneIds);

    if (error) { console.error('일괄 삭제 실패:', error); return; }

    items = items.filter(i => !i.done);
    render();
  }

  function createItemEl(item) {
    const li = document.createElement('li');
    if (item.done) li.classList.add('checked');

    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.checked = item.done;
    checkbox.addEventListener('change', () => toggle(item.id));

    const span = document.createElement('span');
    span.className = 'item-text';
    span.textContent = item.text;

    const btn = document.createElement('button');
    btn.className = 'delete-btn';
    btn.title = '삭제';
    btn.textContent = '✕';
    btn.addEventListener('click', () => remove(item.id));

    li.append(checkbox, span, btn);
    return li;
  }

  function render() {
    const filtered = items.filter(item => {
      if (filter === 'active') return !item.done;
      if (filter === 'done') return item.done;
      return true;
    });

    list.replaceChildren();

    if (filtered.length === 0) {
      const li = document.createElement('li');
      li.className = 'empty';
      li.textContent = '항목이 없습니다';
      list.appendChild(li);
    } else {
      filtered.forEach(item => list.appendChild(createItemEl(item)));
    }

    const total = items.length;
    const done = items.filter(i => i.done).length;
    stats.textContent = total === 0 ? '아이템 없음' : `${done} / ${total} 완료`;
  }

  document.getElementById('addBtn').addEventListener('click', addItem);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

  document.querySelectorAll('.filters button').forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  document.getElementById('clearDone').addEventListener('click', clearDone);

  loadItems();
</script>
</body>
</html>
